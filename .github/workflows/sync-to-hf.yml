name: Sync to Hugging Face

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync files to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e

          # Inicializa novo repo
          mkdir hf_sync && cd hf_sync
          git init
          git config user.email "dragonbrx@example.com"
          git config user.name "DragonBRX"

          # Adiciona remote com token embutido (formato oauth2)
          git remote add origin "https://oauth2:${HF_TOKEN}@huggingface.co/DragonBRX/BRX"

          # Pula download de arquivos LFS
          export GIT_LFS_SKIP_SMUDGE=1

          # Faz fetch do HF
          git fetch --depth=1 origin main
          git checkout -b main origin/main

          echo "=== HF repo clonado ==="
          ls -la

          # Preserva arquivos do HF
          mkdir -p ../preserve
          cp -r parametros ../preserve/ 2>/dev/null || true
          cp .gitattributes ../preserve/ 2>/dev/null || true

          # Remove todos os arquivos tracked
          git rm -rf . 2>/dev/null || true
          find . -not -path './.git/*' -not -name '.git' -delete 2>/dev/null || true

          # Copia arquivos do GitHub
          cp -r ../agents . 2>/dev/null || true
          cp -r ../consciousness . 2>/dev/null || true
          cp -r ../core . 2>/dev/null || true
          cp -r ../dashboard . 2>/dev/null || true
          cp -r ../minds . 2>/dev/null || true
          cp -r ../parameters . 2>/dev/null || true
          cp -r ../search . 2>/dev/null || true
          cp -r ../utils . 2>/dev/null || true

          cp ../README.md . 2>/dev/null || true
          cp ../requirements.txt . 2>/dev/null || true
          cp ../setup.py . 2>/dev/null || true
          cp ../__init__.py . 2>/dev/null || true
          cp ../hf_hub.py . 2>/dev/null || true
          cp ../brx_chat.py . 2>/dev/null || true
          cp ../brx_chat_v3.py . 2>/dev/null || true
          cp ../brx_autonomous.py . 2>/dev/null || true
          cp ../brx_autonomous_v7.py . 2>/dev/null || true
          cp ../brx_run.sh . 2>/dev/null || true
          cp ../test_brx.py . 2>/dev/null || true
          cp ../test_storage_path.py . 2>/dev/null || true
          cp ../test_v3.py . 2>/dev/null || true
          cp ../architecture.mmd . 2>/dev/null || true
          cp ../architecture.png . 2>/dev/null || true
          cp ../CORRECOES_README.md . 2>/dev/null || true
          cp ../EXEMPLO_USO.md . 2>/dev/null || true
          cp ../INSTALL.md . 2>/dev/null || true
          cp ../README_V3.md . 2>/dev/null || true
          cp ../README_V7.md . 2>/dev/null || true

          # Restaura arquivos do HF
          cp -r ../preserve/parametros . 2>/dev/null || true
          cp ../preserve/.gitattributes . 2>/dev/null || true

          echo "=== Arquivos após sync ==="
          ls -la

          # Commit e push
          git add -A
          git status
          git commit -m "BRX-AGENT v3.0: Sincronizacao automatica GitHub -> HF Hub" || echo "Nada para commitar"
          git push origin main

          echo "✓ Sync completo!"
